    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById('favorites-items-container');
            let favorites = JSON.parse(localStorage.getItem('savedFavorites')) || [];

            if (favorites.length === 0) {
                container.innerHTML = '<p class="empty-page-text">Nu ai niciun produs salvat în favorite.</p>';
            } else {
                favorites.forEach(productId => {
                    const product = products[productId];
                    if (product) {
                        const productHTML = `
                            <div class="product-item">
                                <a href="product.html?id=${productId}" class="product-link">
                                    <img src="${product.image}" alt="Coperta ${product.title}">
                                    <h3>${product.title}</h3>
                                </a>
                                <p class="price"><strong>${product.price}</strong></p>
                                <p class="format">${product.format}</p>
                                <button class="btn-remove" data-id="${productId}">Șterge</button>
                            </div>
                        `;
                        container.innerHTML += productHTML;
                    }
                });
                
                addRemoveListeners();
            }
        });

        function addRemoveListeners() {
            document.querySelectorAll('.btn-remove').forEach(button => {
                button.addEventListener('click', function() {
                    const productIdToRemove = this.getAttribute('data-id');
                    removeFromFavorites(productIdToRemove);
                });
            });
        }

        function removeFromFavorites(productId) {
            let favorites = JSON.parse(localStorage.getItem('savedFavorites')) || [];
            favorites = favorites.filter(id => id !== productId);
            localStorage.setItem('savedFavorites', JSON.stringify(favorites));
            location.reload();
        }
    </script>
